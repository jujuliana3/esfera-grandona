<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfera 3D Interativa</title>
    <style>
        /* O CSS: Define a aparência e animações */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f0f0f;
            overflow: hidden;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .esfera {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            z-index: 2;
            
            /* Variável para a cor que o JavaScript vai mudar */
            --cor-principal: #00d4ff;
            
            /* Efeito 3D usando Gradiente Radial */
            background: radial-gradient(circle at 30% 30%, #ffffff, var(--cor-principal) 60%, #000);
            
            /* Sombra interna para dar profundidade */
            box-shadow: inset -10px -10px 50px rgba(0,0,0,0.8);
            
            /* Animação e Suavidade */
            transition: background 0.6s ease, transform 0.3s ease;
            animation: flutuar 3s ease-in-out infinite;
        }

        .esfera:hover {
            transform: scale(1.1); /* Aumenta um pouco ao passar o mouse */
        }

        /* Sombra no chão */
        .sombra {
            width: 120px;
            height: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            margin-top: 40px;
            filter: blur(8px);
            animation: pulsarSombra 3s ease-in-out infinite;
        }

        /* Movimentos */
        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        @keyframes pulsarSombra {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(0.6); opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="esfera" id="minhaEsfera"></div>
        <div class="sombra"></div>
    </div>

    <script>
        /* O JAVASCRIPT: A lógica da cor aleatória */
        const esfera = document.getElementById('minhaEsfera');

        esfera.addEventListener('mouseenter', () => {
            // Gera uma cor aleatória em formato Hexadecimal (#RRGGBB)
            const novaCor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            
            // Troca o valor da variável CSS da esfera
            esfera.style.setProperty('--cor-principal', novaCor);
        });
    </script>

</body>
</html>
